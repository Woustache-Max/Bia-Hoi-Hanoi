<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bia Hơi Hanoi</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--gold:#f5b301;--gold-dark:#b9780f;--ink:#1f1a12;--paper:#fffaf0;--card:#fff;
        --muted:#7a7263;--line:#ece3d2;--green:#2e7d32;--red:#c0392b;--blue:#185fa5;--orange:#e65100;
        --shadow:rgba(0,0,0,.12)}
  [data-theme="dark"]{
    --ink:#e8dcc8;--paper:#141210;--card:#1c1812;--muted:#8a7e6e;
    --line:#2a241c;--gold:#f5b301;--gold-dark:#ffc41f;--green:#4caf50;
    --blue:#64b5f6;--shadow:rgba(0,0,0,.4);--card-alt:#231e17}
  [data-theme="dark"] body{background:var(--paper);color:var(--ink)}
  [data-theme="dark"] #sidebar{background:var(--card)}
  [data-theme="dark"] .toolbar{background:var(--card)}
  [data-theme="dark"] .list-item:hover{background:#221c14}
  [data-theme="dark"] .factbox{background:#221c14;border-color:var(--line)}
  [data-theme="dark"] .modal{background:var(--card)}
  [data-theme="dark"] .rate-row{background:#221c14;border-color:var(--line)}
  [data-theme="dark"] .form-section{background:#1e1912;border-color:var(--line)}
  [data-theme="dark"] form input,[data-theme="dark"] form textarea,[data-theme="dark"] form select{background:#2a2318;border-color:var(--line);color:var(--ink)}
  [data-theme="dark"] textarea{background:#2a2318;border-color:var(--line);color:var(--ink)}
  [data-theme="dark"] .hint{background:#1e1a0e;border-color:#5a4a00}
  [data-theme="dark"] .hint-verify{background:#1e140a;border-color:#7a4a00}
  [data-theme="dark"] .hint-upgrade{background:#0e1e10;border-color:#2a6a30}
  [data-theme="dark"] .quest-box{background:#1e1912;border-color:var(--line)}
  [data-theme="dark"] .admin-table th{background:#221c14}
  [data-theme="dark"] .admin-table tr:hover td{background:#1e1912}
  [data-theme="dark"] .seg button{background:var(--card);color:var(--muted)}
  [data-theme="dark"] .filters{background:var(--card)}
  [data-theme="dark"] .filters select,.filters input{background:#2a2318;color:var(--ink);border-color:var(--line)}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:'Be Vietnam Pro',system-ui,sans-serif;color:var(--ink);background:var(--paper)}
  #app{display:flex;flex-direction:column;height:100vh}
  header{display:flex;align-items:center;gap:10px;padding:9px 14px;background:var(--ink);color:var(--gold);z-index:1200;box-shadow:0 2px 8px rgba(0,0,0,.25)}
  header h1{font-size:18px;margin:0;letter-spacing:.2px;font-weight:800}
  header .logo{font-size:22px}
  header .spacer{flex:1}
  header .user{font-size:13px;color:#fff;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  button{cursor:pointer;font-family:inherit;border:none;border-radius:8px;padding:8px 13px;font-size:14px;font-weight:600;transition:.15s}
  .btn-gold{background:var(--gold);color:var(--ink)}.btn-gold:hover{background:#ffc41f}
  .btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.4)}.btn-ghost:hover{background:rgba(255,255,255,.12)}
  .btn-sm{padding:5px 10px;font-size:13px}
  .btn-line{background:#fff;border:1px solid var(--line);color:var(--ink)}
  .btn-verify{background:#e8f5e9;border:1px solid #a5d6a7;color:var(--green);font-size:13px;padding:5px 10px}
  .btn-verify:hover{background:#c8e6c9}
  .main{flex:1;display:flex;min-height:0}
  #map{flex:1;min-width:0}
  #sidebar{position:relative;width:390px;max-width:44vw;background:var(--card);border-left:1px solid var(--line);overflow-y:auto;display:flex;flex-direction:column}
  .panel{padding:16px}
  .toolbar{display:flex;gap:8px;padding:10px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--card);z-index:5;flex-wrap:wrap}
  .toolbar input.search{flex:1;min-width:120px;padding:8px 11px;border:1px solid var(--line);border-radius:8px;font-size:14px}
  .filters{padding:0 14px 10px;border-bottom:1px solid var(--line);display:none;flex-wrap:wrap;gap:8px}
  .filters.open{display:flex}
  .filters select,.filters input{padding:6px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px}
  .chip{font-size:12px;padding:3px 9px;border-radius:20px;background:#f0e8d6;color:var(--ink);font-weight:600}
  .chip.open{background:#e6f5e6;color:var(--green)}
  .chip.closed{background:#fbe6e6;color:var(--red)}
  .chip.unverified{background:#fff3e0;color:var(--orange);border:1px solid #ffcc80}
  .chip.verified{background:#e8f5e9;color:var(--green)}
  .list-item{padding:12px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;gap:11px;align-items:flex-start}
  .list-item:hover{background:#fff8e6}
  .list-item .list-thumb{width:62px;height:62px;border-radius:9px;object-fit:cover;flex-shrink:0;background:var(--line)}
  .list-item .list-thumb-ph{width:62px;height:62px;border-radius:9px;flex-shrink:0;background:linear-gradient(135deg,#f0e8d6,#e8dcc8);display:flex;align-items:center;justify-content:center;font-size:26px;color:var(--gold-dark)}
  .list-item .list-text{flex:1;min-width:0}
  .list-item h3{margin:0 0 3px;font-size:15px}
  .list-item .meta{font-size:12px;color:var(--muted);display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap}
  .glass{color:var(--gold-dark);letter-spacing:1px}.glass .e{color:#dcd4c4}
  .detail h2{margin:0 0 4px;font-size:21px}
  .factbox{background:#fbf6ea;border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin:10px 0}
  .factrow{display:flex;gap:8px;font-size:13px;padding:3px 0;align-items:flex-start}
  .factrow b{color:var(--muted);font-weight:600;min-width:96px}
  .desc{font-size:14px;line-height:1.5;margin:10px 0}
  .sec{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin:18px 0 8px;font-weight:700;border-top:1px solid var(--line);padding-top:12px}
  .photos{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .photos img{width:100%;height:78px;object-fit:cover;border-radius:6px;cursor:pointer}
  .review{border-top:1px solid var(--line);padding:10px 0}
  .review .who{font-weight:600;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .review .rgrid{display:flex;flex-wrap:wrap;gap:8px;margin:5px 0;font-size:11px;color:var(--muted)}
  .review .txt{font-size:13px;line-height:1.45;margin-top:3px}
  .review .when{font-size:11px;color:var(--muted);margin-top:4px}
  .vote{font-size:12px;color:var(--blue);cursor:pointer;font-weight:600;background:none;border:none;padding:0}
  form label{display:block;font-size:12px;font-weight:600;color:var(--muted);margin:0 0 5px;letter-spacing:.1px}
  form input,form textarea,form select{width:100%;padding:9px 11px;border:1.5px solid var(--line);border-radius:9px;font-size:14px;font-family:inherit;background:#fff;transition:border-color .15s,box-shadow .15s;color:var(--ink)}
  form input:focus,form textarea:focus,form select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,179,1,.15)}
  form textarea{resize:vertical;min-height:72px;line-height:1.5}
  .row2{display:flex;gap:10px;align-items:flex-start}.row2>div{flex:1;min-width:0}
  .form-section{background:#fbf8f2;border:1px solid var(--line);border-radius:11px;padding:14px 16px;margin:6px 0 12px;display:flex;flex-direction:column;gap:12px}
  .form-sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin:10px 0 0;padding-bottom:5px;border-bottom:1px solid var(--line)}
  .rate-row{display:flex;align-items:center;justify-content:space-between;background:#fbf6ea;border:1px solid var(--line);border-radius:8px;padding:7px 11px;margin-top:6px}
  .rate-row .lbl{font-size:13px;font-weight:600}
  .gpick span{font-size:21px;cursor:pointer;filter:grayscale(1);opacity:.3;transition:.12s;display:inline-block}.gpick span.on{filter:none;opacity:1;transform:scale(1.18)}
  .gpick .clr{font-size:11px;color:var(--muted);margin-left:6px;font-weight:600;filter:none!important;opacity:1!important;transform:none!important}
  .tagpick{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .tagpick label{display:inline-flex;align-items:center;gap:4px;font-size:12px;background:#f0e8d6;padding:4px 9px;border-radius:16px;cursor:pointer;color:var(--ink);margin:0;font-weight:600}
  .tagpick label.on{background:var(--gold);color:var(--ink)}
  .tagpick input{display:none}
  .back{font-size:13px;color:var(--gold-dark);cursor:pointer;display:inline-block;margin-bottom:8px;font-weight:600}
  .empty-note{padding:30px 18px;color:var(--muted);font-size:14px;text-align:center;line-height:1.6}
  .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1499}
  @media(max-width:680px){.sheet-overlay.on{display:block}}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:3000;padding:16px}
  .modal{background:#fff;border-radius:14px;padding:22px;width:360px;max-width:94vw;max-height:90vh;overflow-y:auto}
  .modal h2{margin:0 0 4px;font-size:20px}.modal p{font-size:13px;color:var(--muted);margin:0 0 12px;line-height:1.5}
  .modal img.full{max-width:88vw;max-height:84vh;border-radius:8px;display:block}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-top:6px}
  .seg button{flex:1;border-radius:0;background:#fff;color:var(--muted);border-right:1px solid var(--line)}
  .seg button:last-child{border-right:none}.seg button.on{background:var(--gold);color:var(--ink)}
  .pill{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700;background:var(--gold);color:var(--ink)}
  .badge-grid{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .badge-item{display:flex;flex-direction:column;align-items:center;gap:3px;width:72px;text-align:center}
  .badge-icon{font-size:28px;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.15))}
  .badge-icon.locked{filter:grayscale(1);opacity:.25}
  .badge-name{font-size:10px;font-weight:700;color:var(--ink);line-height:1.2}
  .badge-name.locked{color:var(--muted)}
  .badge-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;border-radius:12px;padding:10px 18px;font-size:14px;font-weight:600;
    display:flex;align-items:center;gap:8px;z-index:9999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
  .badge-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .inline-badges{display:inline-flex;gap:2px;font-size:13px;vertical-align:middle;margin-left:3px}
  .pill.role-admin{background:#185fa5;color:#fff}
  .pill.role-active{background:#2e7d32;color:#fff}
  .pill.role-newcomer{background:#f0e8d6;color:var(--ink)}
  .hint{font-size:12px;color:var(--muted);background:#fff8e6;border:1px dashed var(--gold);padding:8px 10px;border-radius:8px;margin:8px 0}
  .hint-verify{font-size:12px;color:var(--orange);background:#fff3e0;border:1px dashed #ffb74d;padding:8px 10px;border-radius:8px;margin:8px 0}
  .hint-upgrade{font-size:12px;color:var(--green);background:#e8f5e9;border:1px dashed #81c784;padding:10px 12px;border-radius:8px;margin:8px 0;line-height:1.6}
  .char-count{font-size:11px;color:var(--muted);text-align:right;margin-top:2px}
  .char-count.over{color:var(--red);font-weight:700}
  .quest-box{background:#fff8e6;border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin:10px 0}
  .quest-box h4{margin:0 0 8px;font-size:14px;color:var(--gold-dark)}
  .quest-path{margin-bottom:8px;font-size:13px}
  .quest-path .label{font-weight:600;margin-bottom:4px}
  .q-bar{height:8px;background:#f0e8d6;border-radius:4px;overflow:hidden;margin:4px 0}
  .q-bar-fill{height:100%;background:var(--gold);border-radius:4px;transition:.3s}
  .q-bar-fill.done{background:var(--green)}
  .q-step{font-size:12px;color:var(--muted);display:flex;justify-content:space-between}
  .leaflet-popup-content{font-family:inherit;margin:10px 12px}
  .bia-pin{font-size:30px;line-height:1;text-align:center;background:#fff;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.35),0 0 0 2px var(--gold)}
  .bia-pin.closed{filter:grayscale(1);opacity:.6;box-shadow:0 2px 6px rgba(0,0,0,.25),0 0 0 2px #aaa}
  .bia-pin.unverified{background:#ede9e0;box-shadow:0 2px 5px rgba(0,0,0,.18);outline:2.5px dashed #e65100;outline-offset:2px;filter:grayscale(40%);opacity:.8}
  .loading-overlay{position:absolute;inset:0;background:rgba(255,250,240,.85);display:flex;align-items:center;justify-content:center;z-index:2000;font-size:15px;color:var(--muted)}
  .mobile-toggle{display:none}
  .sidebar-close{display:none;position:absolute;top:10px;right:10px;z-index:10;background:var(--ink);color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:18px;line-height:32px;text-align:center;padding:0;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.3)}
  .sheet-handle{display:none}
  @media(max-width:680px){
    .main{position:relative}
    #map{height:100%;min-height:0}
    #sidebar{position:fixed;left:0;right:0;bottom:0;width:100%;max-width:100%;height:72vh;
      border-radius:20px 20px 0 0;box-shadow:0 -6px 28px rgba(0,0,0,.18);
      transform:translateY(100%);transition:.28s cubic-bezier(.4,0,.2,1);z-index:1500;
      overflow-y:auto;overflow-x:hidden}
    #sidebar.open{transform:translateY(0)}
    .mobile-toggle{display:inline-block}
    .sidebar-close{display:none}
    .sheet-handle{display:block;width:40px;height:4px;background:var(--line);
      border-radius:2px;margin:12px auto 4px;cursor:pointer;flex-shrink:0}
    .toolbar{padding-top:4px}
    #app{overflow:hidden}
  }
  @media(max-width:680px) and (orientation:landscape){
    #sidebar{height:88vh}
  }

  .modal-admin{width:96vw;max-width:1100px;max-height:93vh;padding:0;overflow:hidden;display:flex;flex-direction:column}
  .admin-header{padding:14px 18px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-shrink:0}
  .admin-tabs{display:flex;border-bottom:1px solid var(--line);padding:0 18px;flex-shrink:0;overflow-x:auto}
  .admin-tab{padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:var(--muted);white-space:nowrap;background:none;border-radius:0}
  .admin-tab.on{color:var(--ink);border-bottom-color:var(--gold)}
  .admin-tab:hover{color:var(--ink)}
  .admin-body{padding:16px 18px;overflow-y:auto;flex:1}
  .admin-table{width:100%;border-collapse:collapse;font-size:13px}
  .admin-table th{text-align:left;padding:8px 10px;background:#f8f4eb;border-bottom:2px solid var(--line);font-weight:700;color:var(--muted);white-space:nowrap}
  .admin-table td{padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:middle}
  .admin-table tr:hover td{background:#fff8e6}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
  .stat-card{background:#f8f4eb;border-radius:10px;padding:14px;text-align:center}
  .stat-card .num{font-size:26px;font-weight:800;color:var(--gold-dark)}
  .stat-card .lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="logo">🍺</span><h1>Bia Hơi Hanoi</h1>
    <span class="spacer"></span>
    <button class="btn-ghost btn-sm mobile-toggle" onclick="toggleSidebar()">☰</button>
    <button id="darkBtn" class="btn-ghost btn-sm" onclick="toggleDark()" title="Toggle dark mode" style="font-size:16px;padding:4px 8px">🌙</button>
    <button class="btn-gold btn-sm" onclick="startAdd()">+ Add spot</button>
    <span class="user" id="userLabel"></span>
  </header>
  <div class="sheet-overlay" id="sheetOverlay" onclick="closeSidebar()"></div>
  <div class="main" style="position:relative">
    <div id="map"></div>
    <div id="sidebar">
      <div class="sheet-handle" onclick="closeSidebar()" title="Close"></div>
      <button class="sidebar-close" onclick="closeSidebar()" title="Close sidebar">✕</button>
      <div class="toolbar">
        <input class="search" id="searchBox" placeholder="Search spots…" oninput="renderList()">
        <button class="btn-line btn-sm" onclick="toggleFilters()">⚲ Filters</button>
        <button class="btn-line btn-sm" id="nearMeBtn" onclick="nearMe()">📍 Near me</button>
        <select id="fRadius" onchange="renderList(true)" style="padding:5px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px;display:none">
          <option value="0.5">Within 500m</option>
          <option value="1">Within 1km</option>
          <option value="2">Within 2km</option>
          <option value="5">Within 5km</option>
          <option value="10">Within 10km</option>
          <option value="0">Any distance</option>
        </select>
      </div>
      <div class="filters" id="filters">
        <select id="fDistrict" onchange="renderList()"><option value="">All districts</option></select>
        <select id="fVibe" onchange="renderList()"><option value="">Any vibe</option></select>
        <select id="fRating" onchange="renderList()">
          <option value="0">Any rating</option><option value="3">3+ 🍺</option>
          <option value="4">4+ 🍺</option><option value="4.5">4.5+ 🍺</option></select>
        <select id="fPrice" onchange="renderList()">
          <option value="0">Any price</option><option value="15000">≤15,000₫</option>
          <option value="20000">≤20,000₫</option><option value="30000">≤30,000₫</option></select>
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--muted)">
          <input type="checkbox" id="fOpen" style="width:auto" onchange="renderList()"> Open now</label>
        <label style="display:flex;align-items:center;gap:5px;font-size:13px;font-weight:600;color:var(--muted)">
          <input type="checkbox" id="fVerified" style="width:auto" onchange="renderList()"> Verified only</label>
      </div>
      <div id="sidebarBody"><div class="empty-note">🍺 Loading spots…</div></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>

const DISTRICTS=["Hoàn Kiếm","Ba Đình","Đống Đa","Hai Bà Trưng","Tây Hồ","Cầu Giấy","Thanh Xuân","Long Biên","Hoàng Mai","Other"];

const BADGES=[
  {id:'first_spot',   icon:'📍', name:'First Pour',       desc:'Added your first bia hơi spot'},

  {id:'cartographer', icon:'🏙️', name:'Cartographer',     desc:'Added 10 spots to the map'},
  {id:'first_review', icon:'✍️', name:'First Words',      desc:'Wrote your first review'},
  {id:'regular',      icon:'📝', name:'Regular',          desc:'Wrote 10 reviews'},
  {id:'critic',       icon:'🎙️', name:'Bia Hơi Critic',   desc:'Wrote 25 reviews'},
  {id:'photographer', icon:'📷', name:'Photographer',     desc:'Uploaded your first photo'},
  {id:'verified_spot',icon:'✅', name:'Legit',            desc:'Had one of your spots verified'},
  {id:'trusted',      icon:'🌟', name:'Trusted Local',    desc:'Had 3 of your spots verified'},
  {id:'helpful',      icon:'👍', name:'Crowd Favourite',  desc:'Received 10 helpful votes on reviews'},
];

/* ============ STATE ============ */
let spots = [];
let cur   = null;            // current user: { id, name, role, since, email }
const profilesCache = {};    // uuid → profile, for fast lookups

/* ============ DB CONVERTERS ============ */
function dbToSpot(s){
  return{
    id:s.id, name:s.name, lat:s.lat, lng:s.lng,
    district:s.district||'', address:s.address||'',
    pricePerGlass:s.price_per_glass||'',
    openH:s.open_h, closeH:s.close_h,
    seating:s.seating||'', payment:s.payment||'',
    vibes:s.vibes||[], desc:s.description||'',
    status:s.status||'active',
    createdBy:s.created_by||'anon', createdAt:s.created_at,
    verified:s.verified||false,
    verifiedBy:s.verified_by||null, verifiedAt:s.verified_at||null,
    reports:s.reports||[],
    reviews:(s.reviews||[]).map(dbToReview)
  };
}
function dbToReview(r){
  return{
    id:r.id, userId:r.user_id||'anon', who:r.who||'Anonymous',
    ratings:r.ratings||{}, txt:r.txt||'',
    when:r.review_date, helpful:r.helpful||[]
  };
}

/* ============ HELPERS ============ */
const esc=t=>(t==null?'':String(t)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const byId=id=>spots.find(s=>s.id===id);
const userById=id=>profilesCache[id]||null;
function revAvg(r){const v=RCATS.map(c=>r.ratings[c[0]]).filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0}
function spotAvg(s){const a=s.reviews.map(revAvg).filter(x=>x>0);return a.length?a.reduce((x,y)=>x+y,0)/a.length:0}
function glassStr(n){let f=Math.round(n),o='';for(let i=1;i<=5;i++)o+=i<=f?'🍺':'<span class="e">🍺</span>';return '<span class="glass">'+o+'</span>'}
function dist(a,b,c,d){const R=6371,dx=(c-a)*Math.PI/180,dy=(d-b)*Math.PI/180;const x=Math.sin(dx/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dy/2)**2;return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))}
function fmtHr(h){if(h==null||h==='')return '';h=+h;const d=h%24,ap=d<12||d===24?'am':'pm';let hh=d%12;if(hh===0)hh=12;return hh+ap}
function isOpen(s){if(s.status!=='active'||s.openH==null||s.closeH==null)return false;const n=new Date(),now=n.getHours()+n.getMinutes()/60;let o=+s.openH,c=+s.closeH;if(c<=o)c+=24;let t=now;if(t<o)t+=24;return t>=o&&t<c}
function rolePill(role){return `<span class="pill role-${role}">${role}</span>`}
const val=id=>{const el=document.getElementById(id);return el?el.value.trim():''};

/* ============ QUEST / PROGRESS ============ */
function getUserStats(uid){
  let spotsAdded=0,reviewCount=0;
  const spotIdsReviewed=new Set();
  spots.forEach(s=>{
    if(s.createdBy===uid)spotsAdded++;
    s.reviews.forEach(r=>{if(r.userId===uid){reviewCount++;spotIdsReviewed.add(s.id)}});
  });
  return{spotsAdded,reviewCount,uniqueSpotsReviewed:spotIdsReviewed.size};
}
function questComplete(uid){
  const{spotsAdded,reviewCount,uniqueSpotsReviewed}=getUserStats(uid);
  return(spotsAdded>=QUEST_A_SPOTS&&reviewCount>=QUEST_A_REVIEWS)||(uniqueSpotsReviewed>=QUEST_B_SPOTS);
}
async function checkAndUpgrade(){
  if(!cur||cur.role!=='newcomer')return;
  if(questComplete(cur.id)){
    const{error}=await db.from('profiles').update({role:'active'}).eq('id',cur.id);
    if(error)return;
    cur.role='active';profilesCache[cur.id]=cur;
    setUserLabel();
    modal(`<h2>🎉 You're now Active!</h2>
      <p>You've contributed enough to unlock full reviews and trusted status. Your spots will now be auto-verified. Thanks for helping build the map!</p>
      <button class="btn-gold" style="width:100%;margin-top:10px" onclick="closeModal()">Let's go 🍺</button>`);
  }
}
function questProgressHTML(uid){
  const{spotsAdded,reviewCount,uniqueSpotsReviewed}=getUserStats(uid);
  const aSpot=Math.min(spotsAdded,QUEST_A_SPOTS),aRev=Math.min(reviewCount,QUEST_A_REVIEWS);
  const bSpots=Math.min(uniqueSpotsReviewed,QUEST_B_SPOTS);
  const aDone=spotsAdded>=QUEST_A_SPOTS&&reviewCount>=QUEST_A_REVIEWS;
  const bDone=uniqueSpotsReviewed>=QUEST_B_SPOTS;
  return `<div class="quest-box">
    <h4>🗺 Quest — Unlock Active status</h4>
    <p style="font-size:12px;color:var(--muted);margin:0 0 10px">Complete either path to unlock full reviews and auto-verified spots.</p>
    <div class="quest-path">
      <div class="label" style="color:${aDone?'var(--green)':'var(--ink)'}">Path A: Explorer ${aDone?'✓':''}</div>
      <div class="q-step"><span>Add ${QUEST_A_SPOTS} spot</span><span>${aSpot}/${QUEST_A_SPOTS}</span></div>
      <div class="q-bar"><div class="q-bar-fill${aSpot>=QUEST_A_SPOTS?' done':''}" style="width:${(aSpot/QUEST_A_SPOTS)*100}%"></div></div>
      <div class="q-step"><span>Write ${QUEST_A_REVIEWS} reviews (any spots)</span><span>${aRev}/${QUEST_A_REVIEWS}</span></div>
      <div class="q-bar"><div class="q-bar-fill${aRev>=QUEST_A_REVIEWS?' done':''}" style="width:${(aRev/QUEST_A_REVIEWS)*100}%"></div></div>
    </div>
    <div class="quest-path">
      <div class="label" style="color:${bDone?'var(--green)':'var(--ink)'}">Path B: Reviewer ${bDone?'✓':''}</div>
      <div class="q-step"><span>Review ${QUEST_B_SPOTS} different spots</span><span>${bSpots}/${QUEST_B_SPOTS}</span></div>
      <div class="q-bar"><div class="q-bar-fill${bSpots>=QUEST_B_SPOTS?' done':''}" style="width:${(bSpots/QUEST_B_SPOTS)*100}%"></div></div>
    </div>
  </div>`;
}

/* ============ MAP ============ */
const map=L.map('map').setView(HANOI,13);
const CARTO_ATTR='© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>';
const tileLight=L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:CARTO_ATTR});
const tileDark=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,attribution:CARTO_ATTR});
(localStorage.getItem('theme')==='dark'?tileDark:tileLight).addTo(map);
const cluster=L.markerClusterGroup({maxClusterRadius:45});map.addLayer(cluster);
map.on('click',()=>{if(innerWidth<=680)document.getElementById('sidebar').classList.remove('open');});
let tmpMarker=null,adding=false;
function pinIcon(closed,unverified){
  let cls='bia-pin';
  if(closed)cls+=' closed';
  else if(unverified)cls+=' unverified';
  return L.divIcon({className:'',html:`<div class="${cls}">🍺</div>`,iconSize:[44,44],iconAnchor:[22,44]});
}
function drawMarkers(){
  cluster.clearLayers();
  visibleSpots().forEach(s=>{
    const closed=s.status!=='active',unverified=!s.verified;
    const m=L.marker([s.lat,s.lng],{icon:pinIcon(closed,unverified)});
    const badge=unverified?'<span style="color:#e65100;font-size:11px"> · unverified</span>':'';
    m.bindPopup(`<b>${esc(s.name)}</b>${badge}<br>${glassStr(spotAvg(s))} ${s.reviews.length?'('+s.reviews.length+')':''}<br><small>${esc(s.pricePerGlass||'')}</small>`);
    m.on('click',()=>showDetail(s.id));cluster.addLayer(m);
  });
}

/* ============ FILTERING ============ */
function visibleSpots(){
  const q=(document.getElementById('searchBox').value||'').toLowerCase();
  const d=document.getElementById('fDistrict').value,v=document.getElementById('fVibe').value;
  const minR=+document.getElementById('fRating').value,maxP=+document.getElementById('fPrice').value;
  const openOnly=document.getElementById('fOpen').checked;
  const verifiedOnly=document.getElementById('fVerified').checked;
  const radiusSel=document.getElementById('fRadius');
  const maxKm=radiusSel&&radiusSel.style.display!=='none'?+radiusSel.value:0;
  return spots.filter(s=>{
    if(maxKm&&window._me&&dist(window._me[0],window._me[1],s.lat,s.lng)>maxKm)return false;
    if(q&&!(s.name.toLowerCase().includes(q)||(s.address||'').toLowerCase().includes(q)))return false;
    if(d&&s.district!==d)return false;
    if(v&&!(s.vibes||[]).includes(v))return false;
    if(minR&&spotAvg(s)<minR)return false;
    if(maxP){const p=parseInt((s.pricePerGlass||'').replace(/\D/g,''))||0;if(!p||p>maxP)return false;}
    if(openOnly&&!isOpen(s))return false;
    if(verifiedOnly&&!s.verified)return false;
    return true;
  });
}

/* ============ LIST ============ */
function renderList(sortByDist){
  adding=false;if(tmpMarker){map.removeLayer(tmpMarker);tmpMarker=null}
  drawMarkers();
  let list=visibleSpots();
  if(sortByDist&&window._me)list=list.slice().sort((a,b)=>dist(window._me[0],window._me[1],a.lat,a.lng)-dist(window._me[0],window._me[1],b.lat,b.lng));
  else list=list.slice().sort((a,b)=>spotAvg(b)-spotAvg(a));
  const body=document.getElementById('sidebarBody');
  if(!spots.length){body.innerHTML='<div class="empty-note">🍺 No spots yet.<br><br>Tap <b>+ Add spot</b> to put a bia hơi on the map — no sign-up needed!</div>';return}
  if(!list.length){body.innerHTML='<div class="empty-note">No spots match your filters.</div>';return}
  body.innerHTML=list.map(s=>{
    const open=isOpen(s),closed=s.status!=='active';
    const d=window._me?dist(window._me[0],window._me[1],s.lat,s.lng):null;
    const dtxt=d!==null?`<span style="background:#e8f0fe;color:#185fa5;border-radius:20px;padding:1px 7px;font-size:11px;font-weight:700">${d<1?(d*1000).toFixed(0)+'m':d.toFixed(1)+'km'}</span>`:'';
    const verBadge=s.verified?'':`<span class="chip unverified">Unverified</span> `;
    const thumb=s.photos&&s.photos.length
      ?`<img class="list-thumb" src="${s.photos[0].url}" alt="" loading="lazy">`
      :`<div class="list-thumb-ph">🍺</div>`;
    return `<div class="list-item" onclick="showDetail('${s.id}')">
      ${thumb}
      <div class="list-text">
        <h3>${verBadge}${esc(s.name)} ${closed?'<span class="chip closed">'+(s.status==='perm_closed'?'Closed':'Temp closed')+'</span>':(open?'<span class="chip open">Open</span>':'')}</h3>
        <div class="meta"><span>${glassStr(spotAvg(s))} ${s.reviews.length?'('+s.reviews.length+')':'<i>new</i>'} ${dtxt}</span>
        <span>${esc(s.district||'')} · ${esc(s.pricePerGlass||'')}</span></div>
      </div></div>`;
  }).join('');
}

/* ============ DETAIL ============ */
let chosen={};
function showDetail(id){
  openSidebar();const s=byId(id);if(!s)return;
  map.setView([s.lat,s.lng],16);
  const admin=cur&&cur.role==='admin';
  const canEdit=(cur&&(s.createdBy===cur.id||admin));
  const canVerify=cur&&!s.verified;
  const facts=[
    ['District',s.district],['Address',s.address],['Price / glass',s.pricePerGlass],
    ['Hours',(s.openH!=null?fmtHr(s.openH)+' – '+fmtHr(s.closeH):'')],
    ['Seating',s.seating],['Payment',s.payment],['Vibe',(s.vibes||[]).join(', ')],
    window._me?['Distance',dist(window._me[0],window._me[1],s.lat,s.lng)<1?(dist(window._me[0],window._me[1],s.lat,s.lng)*1000).toFixed(0)+'m away':dist(window._me[0],window._me[1],s.lat,s.lng).toFixed(1)+'km away']:null
  ].filter(f=>f&&f[1]);
  const gmaps=`https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}`;
  const addedBy=s.createdBy&&s.createdBy!=='anon'&&s.createdBy!=='seed'?userById(s.createdBy):null;
  const body=document.getElementById('sidebarBody');
  body.innerHTML=`<div class="panel detail">
    <span class="back" onclick="renderList()">← All spots</span>
    <h2>${esc(s.name)}</h2>
    <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:4px">
      ${s.verified?'<span class="chip verified">✓ Verified</span>':'<span class="chip unverified">⚠ Unverified</span>'}
      ${isOpen(s)?'<span class="chip open">Open now</span>':''}
      ${s.status==='perm_closed'?'<span class="chip closed">Permanently closed</span>':s.status==='temp_closed'?'<span class="chip closed">Temporarily closed</span>':''}
    </div>
    ${!s.verified?`<div class="hint-verify">Added anonymously — not yet verified.${canVerify?' If you\'ve been here and it\'s real, hit <b>Verify</b>.':' Sign in to verify it.'}</div>`:''}
    <div style="margin:8px 0">${glassStr(spotAvg(s))} <b>${spotAvg(s)?spotAvg(s).toFixed(1):'–'}</b> <small style="color:var(--muted)">${s.reviews.length} review${s.reviews.length===1?'':'s'}</small></div>
    <div class="factbox">
      ${facts.map(f=>`<div class="factrow"><b>${f[0]}</b><span>${esc(f[1])}</span></div>`).join('')}
      ${addedBy?`<div class="factrow"><b>Added by</b><span><a style="color:var(--blue);cursor:pointer" onclick="showProfile('${addedBy.id}')">${esc(addedBy.name)}</a></span></div>`:'<div class="factrow"><b>Added by</b><span style="color:var(--muted)">Anonymous</span></div>'}
    </div>
    <div class="actions">
      <a href="${gmaps}" target="_blank"><button class="btn-gold btn-sm">🧭 Directions</button></a>
      ${canVerify?`<button class="btn-verify" onclick="verifySpot('${s.id}')">✓ Verify spot</button>`:''}
      <button class="btn-line btn-sm" onclick="shareSpot('${s.id}')">🔗 Share</button>
      <button class="btn-line btn-sm" onclick="reportSpot('${s.id}')">⚑ Report</button>
      ${canEdit?`<button class="btn-line btn-sm" onclick="startAdd('${s.id}')">✎ Edit</button>`:''}
      ${admin?`<button class="btn-line btn-sm" onclick="setStatus('${s.id}')">Status</button><button class="btn-line btn-sm" onclick="delSpot('${s.id}')">🗑 Delete</button>`:''}
    </div>
    ${s.desc?`<div class="desc">${esc(s.desc)}</div>`:''}
    <div class="sec" style="display:flex;justify-content:space-between;align-items:center">
      <span>Photos</span>
      ${(cur&&(cur.role==='active'||cur.role==='admin'))?`<button class="btn-line btn-sm" style="font-size:12px" onclick="uploadPhoto('${s.id}')" title="Add a photo of this spot">📷 Add photo</button>`:''}
    </div>
    <div class="photos">${s.photos&&s.photos.length?s.photos.map((p,i)=>`<div style="position:relative;display:inline-block;width:100%"><img src="${p.url}" onclick="viewPhoto('${s.id}',${i})" style="width:100%;height:78px;object-fit:cover;border-radius:6px;cursor:pointer">${(cur&&(p.uploaded_by===cur.id||cur.role==='admin'))?`<button onclick="deletePhoto('${p.id}','${p.path}','${s.id}')" title="Delete photo" style="position:absolute;top:3px;right:3px;background:rgba(0,0,0,.6);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:11px;padding:0;cursor:pointer;line-height:20px;text-align:center">✕</button>`:''}  </div>`).join(''):'<div style="grid-column:1/4;color:var(--muted);font-size:13px;padding:6px 0">No photos yet — be the first to add one!</div>'}</div>
    <div class="sec">Reviews</div>
    <div>${s.reviews.length?s.reviews.map(r=>reviewHTML(s,r)).join(''):'<div style="color:var(--muted);font-size:13px">No reviews yet — be the first.</div>'}</div>
    <div class="sec">Add your review</div>
    ${reviewFormHTML(s.id)}
  </div>`;
  chosen={};
}

/* ============ VERIFY ============ */
async function verifySpot(id){
  if(!cur)return;
  const s=byId(id);
  const verifiedAt=new Date().toISOString().slice(0,10);
  const{error}=await db.from('spots').update({verified:true,verified_by:cur.id,verified_at:verifiedAt}).eq('id',id);
  if(error)return alert('Error verifying: '+error.message);
  s.verified=true;s.verifiedBy=cur.id;s.verifiedAt=verifiedAt;
  showDetail(id);renderList();
}

/* ============ REVIEWS ============ */
function reviewHTML(s,r){
  const admin=cur&&cur.role==='admin';
  const helped=r.helpful?r.helpful.length:0;
  const didI=cur&&r.helpful&&r.helpful.includes(cur.id);
  const isAnon=!r.userId||r.userId==='anon';
  const whoLink=isAnon
    ?`<span style="color:var(--muted)">Anonymous</span>`
    :`<a style="color:inherit;cursor:pointer" onclick="showProfile('${r.userId}')">${esc(r.who)}</a>${inlineBadges(r.userId)}`;
  return `<div class="review">
    <div class="who"><span>${whoLink} ${glassStr(revAvg(r))}</span>
      ${admin?`<button class="vote" style="color:var(--red)" onclick="delReview('${s.id}','${r.id}')">delete</button>`:''}</div>
    <div class="rgrid">${RCATS.filter(c=>r.ratings[c[0]]>0).map(c=>`${c[1]}: ${r.ratings[c[0]]}🍺`).join(' · ')}</div>
    ${r.txt?`<div class="txt">${esc(r.txt)}</div>`:''}
    <div class="when">${r.when}${r.txt?` · <button class="vote" onclick="voteHelpful('${s.id}','${r.id}')">${didI?'✓ Helpful':'👍 Helpful'}${helped?' ('+helped+')':''}</button>`:''}</div>
  </div>`;
}

function reviewFormHTML(id){
  if(!cur){
    return `<div>
      <div style="pointer-events:none;opacity:.45;user-select:none">
        ${RCATS.map(c=>`
        <div class="rate-row"><span class="lbl">${c[1]}</span>
          <span class="gpick">${[1,2,3,4,5].map(i=>`<span>🍺</span>`).join('')}</span></div>`).join('')}
      </div>
      <div style="background:#fbf6ea;border:1px solid var(--line);border-radius:10px;padding:13px 16px;margin-top:8px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap">
        <p style="margin:0;font-size:13px;color:var(--ink);font-weight:600;line-height:1.4">Sign in to rate & review<br><span style="font-weight:400;color:var(--muted)">You can still add spots without an account.</span></p>
        <div style="display:flex;gap:7px;flex-shrink:0">
          <button class="btn-gold btn-sm" onclick="authModal(true)">Join free</button>
          <button class="btn-line btn-sm" onclick="authModal(false)">Sign in</button>
        </div>
      </div>
    </div>`;
  }
  const isNewcomer=cur.role==='newcomer';
  const textNote=isNewcomer?`<span style="color:var(--orange)"> — ${NEWCOMER_CHAR_LIMIT} char limit until you reach Active status</span>`:'';
  const charCounter=isNewcomer?`<div class="char-count" id="charCount">0 / ${NEWCOMER_CHAR_LIMIT}</div>`:'';
  const oninput=isNewcomer?`oninput="updateCharCount(this)"`:'';
  return `<div>
    ${isNewcomer?`<div class="hint-upgrade">✨ Write reviews (up to ${NEWCOMER_CHAR_LIMIT} chars). Complete the quest in your profile to unlock full reviews!</div>`:''}
    ${RCATS.map(c=>`
    <div class="rate-row"><span class="lbl">${c[1]}</span>
      <span class="gpick" id="gp_${c[0]}">${[1,2,3,4,5].map(i=>`<span onclick="pick('${c[0]}',${i})">🍺</span>`).join('')}<span class="clr" onclick="pick('${c[0]}',0)">clear</span></span></div>`).join('')}
    <div style="background:#fbf6ea;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-top:6px">
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:6px">Your thoughts${textNote}</div>
      <textarea id="revTxt" placeholder="What's the crowd like? Best snacks? What makes it special…" ${oninput} style="width:100%;padding:8px 10px;border:1.5px solid var(--line);border-radius:7px;font-size:14px;font-family:inherit;resize:vertical;min-height:72px;background:#fff;color:var(--ink);display:block"></textarea>
      ${charCounter}
    </div>
    <button class="btn-gold" style="width:100%;margin-top:10px;padding:11px;font-size:15px;border-radius:10px" onclick="submitReview('${id}')">Post review</button>
  </div>`;
}

function updateCharCount(el){
  const c=document.getElementById('charCount');if(!c)return;
  const len=el.value.length;
  c.textContent=`${len} / ${NEWCOMER_CHAR_LIMIT}`;
  c.className='char-count'+(len>NEWCOMER_CHAR_LIMIT?' over':'');
}

function pick(cat,v){chosen[cat]=v;const sp=document.querySelectorAll('#gp_'+cat+' span');sp.forEach((el,i)=>{if(i<5)el.classList.toggle('on',i<v)})}

async function submitReview(id){
  const s=byId(id);
  const ratings={};RCATS.forEach(c=>ratings[c[0]]=chosen[c[0]]||0);
  let txt='';
  const txtEl=document.getElementById('revTxt');
  if(txtEl)txt=txtEl.value.trim();
  // Anonymous users cannot write text reviews
  if(!cur&&txt){authModal(true);return;}
  if(cur&&cur.role==='newcomer'&&txt.length>NEWCOMER_CHAR_LIMIT){
    alert(`Reviews are limited to ${NEWCOMER_CHAR_LIMIT} characters until you reach Active status.`);return;
  }
  if(!Object.values(ratings).some(x=>x>0)&&!txt){
    alert('Add at least one rating.');return;
  }
  const who=cur?cur.name:'Anonymous';
  const userId=cur?cur.id:null;
  const reviewData={
    id:'r'+Date.now(),
    spot_id:id,
    user_id:userId,
    who,ratings,txt,
    review_date:new Date().toISOString().slice(0,10),
    helpful:[]
  };
  const{error}=await db.from('reviews').insert([reviewData]);

async function uploadPhoto(spotId){
  if(!cur||!(cur.role==='active'||cur.role==='admin'))return alert('Active members can upload photos.');
  const input=document.createElement('input');
  input.type='file';input.accept='image/jpeg,image/png,image/webp,image/gif';
  input.onchange=async e=>{
    const file=e.target.files[0];if(!file)return;
    if(file.size>5*1024*1024)return alert('Max 5 MB per photo.');
    const ext=file.name.split('.').pop().toLowerCase()||'jpg';
    const path=`${spotId}/${cur.id}_${Date.now()}.${ext}`;
    const uploadBtn=document.querySelector('button[onclick*="uploadPhoto"]');
    if(uploadBtn){uploadBtn.disabled=true;uploadBtn.textContent='⏳ Uploading…';}
    const{error:upErr}=await db.storage.from('spot-photos').upload(path,file,{contentType:file.type,upsert:false});
    if(upErr){if(uploadBtn){uploadBtn.disabled=false;uploadBtn.textContent='📷 Add photo';}return alert('Upload failed: '+upErr.message);}
    const{data:{publicUrl}}=db.storage.from('spot-photos').getPublicUrl(path);
    const{data:row,error:dbErr}=await db.from('photos').insert({spot_id:spotId,uploaded_by:cur.id,url:publicUrl,path}).select().single();
    if(dbErr){await db.storage.from('spot-photos').remove([path]);if(uploadBtn){uploadBtn.disabled=false;uploadBtn.textContent='📷 Add photo';}return alert('Save failed: '+dbErr.message);}
    const spot=byId(spotId);if(spot){if(!spot.photos)spot.photos=[];spot.photos.push(row);}
    awardPhotoBadge();
    showDetail(spotId);
  };
  input.click();
}

async function saveSpot(editId){
  const name=val('f_name'),lat=parseFloat(val('f_lat')),lng=parseFloat(val('f_lng'));
  if(!name)return alert('Add a name.');
  if(isNaN(lat)||isNaN(lng))return alert('Click the map or enter coordinates.');
  const vibes=[...document.querySelectorAll('#f_vibes input:checked')].map(i=>i.value);
  const formData={
    name,lat,lng,
    district:val('f_district'),address:val('f_addr'),
    price_per_glass:val('f_price'),
    open_h:val('f_open')===''?null:+val('f_open'),
    close_h:val('f_close')===''?null:+val('f_close'),
    seating:val('f_seat'),payment:val('f_pay'),
    vibes,description:val('f_desc')
  };
  if(editId){
    const existing=byId(editId);
    const update={...formData};
    if(cur&&!existing.verified){
      update.verified=true;update.verified_by=cur.id;
      update.verified_at=new Date().toISOString().slice(0,10);
    }
    const{error}=await db.from('spots').update(update).eq('id',editId);
    if(error){alert('Error saving: '+error.message);return;}
    Object.assign(existing,{
      name,lat,lng,district:formData.district,address:formData.address,
      pricePerGlass:formData.price_per_glass,openH:formData.open_h,closeH:formData.close_h,
      seating:formData.seating,payment:formData.payment,vibes,desc:formData.description
    });
    if(cur&&!existing.verified){existing.verified=true;existing.verifiedBy=cur.id;existing.verifiedAt=update.verified_at;}
    if(tmpMarker){map.removeLayer(tmpMarker);tmpMarker=null}
    if(cur)await checkAndUpgrade();
    renderList();showDetail(editId);return;
  }
  const dup=spots.find(s=>dist(s.lat,s.lng,lat,lng)<0.05);
  if(dup&&!confirm(`"${dup.name}" is very close by (under 50m). Add anyway?`))return;
  const createdBy=cur?cur.id:'anon';
  const verified=cur&&(cur.role==='active'||cur.role==='admin');
  const id='s'+Date.now();
  const spotData={
    id,...formData,status:'active',photos:[],
    created_by:createdBy,created_at:new Date().toISOString(),
    verified,
    verified_by:verified?cur.id:null,
    verified_at:verified?new Date().toISOString().slice(0,10):null,
    reports:[]
  };
  const{error}=await db.from('spots').insert([spotData]);
  if(error){alert('Error saving: '+error.message);return;}
  spots.push({
    id,name,lat,lng,district:formData.district,address:formData.address,
    pricePerGlass:formData.price_per_glass,openH:formData.open_h,closeH:formData.close_h,
    seating:formData.seating,payment:formData.payment,vibes,desc:formData.description,
    status:'active',photos:[],reviews:[],reports:[],
    createdBy,verified,
    verifiedBy:verified?cur.id:null,
    verifiedAt:verified?spotData.verified_at:null,
    createdAt:Date.now()
  });
  if(tmpMarker){map.removeLayer(tmpMarker);tmpMarker=null}
  if(cur)await checkAndUpgrade();
  renderList();showDetail(id);
}

/* ============ NEAR ME ============ */
function nearMe(){
  const btn=document.getElementById('nearMeBtn');
  // If already active, clear location
  if(window._meWatcher){
    navigator.geolocation.clearWatch(window._meWatcher);
    window._meWatcher=null;
    if(window._meMarker){window._meMarker.remove();window._meMarker=null;}
    window._me=null;
    btn.innerHTML='📍 Near me';
    btn.classList.remove('btn-gold');
    document.getElementById('fRadius').style.display='none';
    renderList(false);
    return;
  }
  if(!navigator.geolocation)return alert('Location not available on this device.');
  btn.innerHTML='⏳ Locating…';
  window._meWatcher=navigator.geolocation.watchPosition(p=>{
    const lat=p.coords.latitude,lng=p.coords.longitude;
    window._me=[lat,lng];
    if(!window._meMarker){
      map.setView([lat,lng],15);
      window._meMarker=L.circleMarker([lat,lng],{radius:10,color:'#185fa5',fillColor:'#4a9fe8',fillOpacity:.92,weight:2.5}).addTo(map).bindPopup('📍 You are here');
      const sel=document.getElementById('fRadius');
      sel.style.display='';sel.value='1';
    } else {
      window._meMarker.setLatLng([lat,lng]);
    }
    btn.innerHTML='📍 Near me ✕';
    btn.classList.add('btn-gold');
    renderList(true);
  },()=>{
    btn.innerHTML='📍 Near me';
    btn.classList.remove('btn-gold');
    alert('Could not get your location — please allow location access.');
  },{enableHighAccuracy:true,maximumAge:10000});
}

      <div class="stat-card"><div class="num">${d.spots.length}</div><div class="lbl">Total spots</div></div>
      <div class="stat-card"><div class="num">${unverified.length}</div><div class="lbl">Unverified</div></div>
      <div class="stat-card"><div class="num">${d.users.length}</div><div class="lbl">Registered users</div></div>
      <div class="stat-card"><div class="num">${reported.length}</div><div class="lbl">Reported spots</div></div>
      <div class="stat-card"><div class="num">${d.reviews.length}</div><div class="lbl">Total reviews</div></div>
    </div>
    ${reported.length?`<div class="hint-verify" style="margin-bottom:14px">⚑ ${reported.length} spot${reported.length>1?'s have':' has'} open reports — check the Reports tab.</div>`:''}
    <div style="font-weight:700;font-size:13px;margin-bottom:8px;color:var(--muted)">UNVERIFIED SPOTS (${unverified.length})</div>
    ${unverified.length?`<table class="admin-table">
      <tr><th>Name</th><th>District</th><th>Added by</th><th>Actions</th></tr>
      ${unverified.map(s=>`<tr>
        <td><a style="color:var(--blue);cursor:pointer;font-weight:600" onclick="closeModal();showDetail('${s.id}')">${esc(s.name)}</a></td>
        <td>${esc(s.district||'—')}</td>
        <td style="color:var(--muted)">${esc(s.created_by==='anon'||s.created_by==='seed'?'Anonymous':s.created_by)}</td>
        <td><button class="btn-verify btn-sm" title="Mark as verified" onclick="adminVerify('${s.id}')">✓ Verify</button>
            <button class="btn-line btn-sm" title="Permanently delete this spot" style="margin-left:4px;color:var(--red)" onclick="adminDeleteSpot('${s.id}')">🗑 Delete</button></td>
      </tr>`).join('')}
    </table>`:'<div style="color:var(--muted);font-size:13px">All spots are verified ✓</div>'}`;
  }
  else if(tab==='spots'){
    body=`<div style="display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap">
      <b style="font-size:13px">${d.spots.length} spots total</b>
      <select id="adminSpotFilter" onchange="filterAdminSpots()" style="padding:5px 8px;border:1px solid var(--line);border-radius:7px;font-size:13px">
        <option value="all">All spots</option>
        <option value="unverified">Unverified only</option>
        <option value="reported">Reported only</option>
        <option value="closed">Closed/temp closed</option>
      </select>
    </div>
    <div id="adminSpotTable">${renderAdminSpotTable(d.spots)}</div>`;
  }
  else if(tab==='users'){
    body=`<table class="admin-table">
      <tr><th>Name</th><th>Role</th><th>Since</th><th>Spots</th><th>Reviews</th><th>Actions</th></tr>
      ${d.users.map(u=>{
        const uSpots=d.spots.filter(s=>s.created_by===u.id).length;
        const uRevs=d.reviews.filter(r=>r.user_id===u.id).length;
        return `<tr>
          <td><b>${esc(u.name)}</b></td>
          <td>${rolePill(u.role)}</td>
          <td style="color:var(--muted);font-size:12px">${u.since||'—'}</td>
          <td>${uSpots}</td><td>${uRevs}</td>
          <td style="white-space:nowrap">
            ${u.id===cur.id?'<span style="font-size:11px;color:var(--muted)">you</span>':`
            ${u.role!=='admin'?`<button class="btn-line btn-sm" title="Promote to Admin" onclick="adminSetRole('${u.id}','admin')">👑 Admin</button> `:''}
            ${u.role!=='active'?`<button class="btn-line btn-sm" title="Set role to Active" onclick="adminSetRole('${u.id}','active')">⭐ Active</button> `:''}
            ${u.role!=='newcomer'?`<button class="btn-line btn-sm" title="Demote to Newcomer" onclick="adminSetRole('${u.id}','newcomer')">↓ Newcomer</button> `:''}
            <button class="btn-line btn-sm" title="Delete this user's profile (they can re-register)" style="color:var(--red)" onclick="adminRemoveUser('${u.id}','${esc(u.name)}')">🗑 Remove</button>
            `}
          </td>
        </tr>`;
      }).join('')}
    </table>`;
  }
  else if(tab==='photos'){
    const photos=d.photos||[];
    const flagged=photos.filter(p=>p.flagged);
    const unflagged=photos.filter(p=>!p.flagged);
    body=`<div style="margin-bottom:10px;font-size:13px;color:var(--muted)">${photos.length} total · ${flagged.length} flagged</div>
    ${flagged.length?`<div class="form-sec-title" style="color:var(--red);border-color:var(--red);margin-bottom:8px">⚑ Flagged (${flagged.length})</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:16px">
      ${flagged.map(p=>`<div style="position:relative;border:2px solid var(--red);border-radius:8px;overflow:hidden">
        <img src="${p.url}" style="width:100%;height:90px;object-fit:cover;display:block">
        <div style="padding:4px 6px;background:#fff3f3;font-size:11px;color:var(--muted)">Spot: ${esc((d.spots.find(s=>s.id===p.spot_id)||{}).name||'?')}</div>
        <div style="padding:4px 6px;display:flex;gap:4px;flex-wrap:wrap">
          <button class="btn-line btn-sm" style="font-size:11px" onclick="adminUnflagPhoto('${p.id}')" title="Unflag this photo">✓ Keep</button>
          <button class="btn-line btn-sm" style="font-size:11px;color:var(--red)" onclick="adminDeletePhoto('${p.id}','${p.path}')" title="Delete permanently">🗑</button>
        </div>
      </div>`).join('')}
    </div>`:''}
    <div class="form-sec-title" style="margin-bottom:8px">All photos (${unflagged.length})</div>
    ${unflagged.length?`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px">
      ${unflagged.map(p=>`<div style="position:relative;border:1px solid var(--line);border-radius:8px;overflow:hidden">
        <img src="${p.url}" style="width:100%;height:90px;object-fit:cover;display:block;cursor:pointer" onclick="window.open('${p.url}')">
        <div style="padding:4px 6px;font-size:11px;color:var(--muted)">${esc((d.spots.find(s=>s.id===p.spot_id)||{}).name||'?')}</div>
        <div style="padding:4px 6px;display:flex;gap:4px">
          <button class="btn-line btn-sm" style="font-size:11px;color:var(--orange)" onclick="adminFlagPhoto('${p.id}')" title="Flag for review">⚑ Flag</button>
          <button class="btn-line btn-sm" style="font-size:11px;color:var(--red)" onclick="adminDeletePhoto('${p.id}','${p.path}')" title="Delete permanently">🗑</button>
        </div>
      </div>`).join('')}
    </div>`:'<div style="color:var(--muted);font-size:13px">No photos yet.</div>'}`;
  }
  else if(tab==='reports'){
    body=reported.length?`<table class="admin-table">
      <tr><th>Spot</th><th>Report details</th><th>Actions</th></tr>
      ${reported.map(s=>`<tr>
        <td>
          <a style="color:var(--blue);cursor:pointer;font-weight:600" onclick="closeModal();showDetail('${s.id}')">${esc(s.name)}</a>
          <div style="font-size:11px;color:var(--muted)">${esc(s.district||'')}</div>
        </td>
        <td>${(s.reports||[]).map(r=>`<div style="font-size:12px;padding:2px 0"><b>${esc(r.by)}</b>: "${esc(r.why)}" <span style="color:var(--muted)">${r.when||''}</span></div>`).join('')}</td>
        <td style="white-space:nowrap">
          <button class="btn-line btn-sm" title="Clear all reports for this spot" onclick="adminDismissReports('${s.id}')">✓ Dismiss</button><br style="margin:3px 0">
          <button class="btn-line btn-sm" title="Permanently delete this spot" style="color:var(--red);margin-top:4px" onclick="adminDeleteSpot('${s.id}')">🗑 Delete spot</button>
        </td>
      </tr>`).join('')}
    </table>`:'<div class="empty-note">No reports. All clear! 🍺</div>';
  }

  document.querySelector('#modal .modal').innerHTML=`
    <div class="admin-header">
      <span style="font-size:22px">🍺</span>
      <h2 style="margin:0;font-size:17px">Admin Panel</h2>
      <span style="flex:1"></span>
      <button class="btn-line btn-sm" onclick="closeModal()">✕ Close</button>
    </div>
    <div class="admin-tabs">${tabs}</div>
    <div class="admin-body">${body}</div>`;
}

function renderAdminSpotTable(list){
  if(!list.length)return '<div style="color:var(--muted);font-size:13px;padding:10px 0">No spots match.</div>';
  return `<table class="admin-table">
    <tr><th>Name</th><th>District</th><th>Status</th><th>Verified</th><th>Reports</th><th>Actions</th></tr>
    ${list.map(s=>`<tr>
      <td><a style="color:var(--blue);cursor:pointer;font-weight:600" onclick="closeModal();showDetail('${s.id}')">${esc(s.name)}</a></td>
      <td>${esc(s.district||'—')}</td>
      <td><span class="chip ${s.status==='active'?'open':s.status==='perm_closed'?'closed':''}">${s.status}</span></td>
      <td>${s.verified?'<span class="chip verified">✓ Yes</span>':'<span class="chip unverified">✗ No</span>'}</td>
      <td>${(s.reports||[]).length?`<span style="color:var(--red);font-weight:700">${s.reports.length}</span>`:'—'}</td>
      <td style="white-space:nowrap">
        ${!s.verified?`<button class="btn-verify btn-sm" title="Mark as verified" onclick="adminVerify('${s.id}')">✓ Verify</button> `:`<button class="btn-line btn-sm" title="Remove verification" onclick="adminUnverify('${s.id}')" style="color:var(--orange)">✗ Unverify</button> `}
        <button class="btn-line btn-sm" title="Permanently delete this spot" onclick="adminDeleteSpot('${s.id}')" style="color:var(--red)">🗑 Delete</button>
      </td>
    </tr>`).join('')}
  </table>`;
}

function filterAdminSpots(){
  const f=document.getElementById('adminSpotFilter').value;
  let list=adminData.spots;
  if(f==='unverified')list=list.filter(s=>!s.verified);
  else if(f==='reported')list=list.filter(s=>(s.reports||[]).length>0);
  else if(f==='closed')list=list.filter(s=>s.status!=='active');
  document.getElementById('adminSpotTable').innerHTML=renderAdminSpotTable(list);
}

async function adminVerify(id){
  const at=new Date().toISOString().slice(0,10);
  const{error}=await db.from('spots').update({verified:true,verified_by:cur.id,verified_at:at}).eq('id',id);
  if(error){alert('Error: '+error.message);return;}
  const s=adminData.spots.find(x=>x.id===id);if(s){s.verified=true;}
  const ls=byId(id);if(ls){ls.verified=true;ls.verifiedBy=cur.id;ls.verifiedAt=at;}
  renderAdmin(document.querySelector('.admin-tab.on')?.textContent.trim().includes('Spot')?'spots':'overview');
  renderList();
}

async function adminUnverify(id){
  const{error}=await db.from('spots').update({verified:false,verified_by:null,verified_at:null}).eq('id',id);
  if(error){alert('Error: '+error.message);return;}
  const s=adminData.spots.find(x=>x.id===id);if(s){s.verified=false;s.verified_by=null;s.verified_at=null;}
  const ls=byId(id);if(ls){ls.verified=false;ls.verifiedBy=null;ls.verifiedAt=null;}
  renderAdmin(document.querySelector('.admin-tab.on')?.textContent.trim().includes('Spot')?'spots':'overview');
  renderList();
}

async function adminDeleteSpot(id){
  if(!confirm('Permanently delete this spot and all its reviews?'))return;
  const{error}=await db.from('spots').delete().eq('id',id);
  if(error){alert('Error: '+error.message);return;}
  adminData.spots=adminData.spots.filter(x=>x.id!==id);
  spots=spots.filter(x=>x.id!==id);
  renderAdmin(document.querySelector('.admin-tab.on')?.textContent.trim().includes('Spot')?'spots':'overview');
  renderList();
}

async function adminSetRole(uid,role){
  const u=adminData.users.find(x=>x.id===uid);
  if(!confirm(`Change ${u?u.name:'this user'} to ${role}?`))return;
  const{error}=await db.from('profiles').update({role}).eq('id',uid);
  if(error){alert('Error: '+error.message);return;}
  if(u)u.role=role;
  if(profilesCache[uid])profilesCache[uid].role=role;
  renderAdmin('users');
}

async function adminRemoveUser(uid,name){
  if(!confirm(`Remove ${name}? Their spots and reviews will remain but their profile and login privileges will be deleted. They can re-register.`))return;
  const{error}=await db.from('profiles').delete().eq('id',uid);
  if(error){alert('Error: '+error.message);return;}
  adminData.users=adminData.users.filter(x=>x.id!==uid);
  delete profilesCache[uid];
  renderAdmin('users');
}

async function adminFlagPhoto(id){
  const{error}=await db.from('photos').update({flagged:true}).eq('id',id);
  if(error)return alert('Error: '+error.message);
  const p=adminData.photos.find(x=>x.id===id);if(p)p.flagged=true;
  renderAdmin('photos');
}
async function adminUnflagPhoto(id){
  const{error}=await db.from('photos').update({flagged:false}).eq('id',id);
  if(error)return alert('Error: '+error.message);
  const p=adminData.photos.find(x=>x.id===id);if(p)p.flagged=false;
  renderAdmin('photos');
}
async function adminDeletePhoto(id,path){
  if(!confirm('Permanently delete this photo?'))return;
  await db.storage.from('spot-photos').remove([path]);
  const{error}=await db.from('photos').delete().eq('id',id);
  if(error)return alert('Error: '+error.message);
  adminData.photos=adminData.photos.filter(x=>x.id!==id);
  const spotId=(adminData.photos.find(x=>x.id===id)||{}).spot_id;
  if(spotId){const s=byId(spotId);if(s)s.photos=(s.photos||[]).filter(p=>p.id!==id);}
  renderAdmin('photos');
}
async function adminDismissReports(id){
  const{error}=await db.from('spots').update({reports:[]}).eq('id',id);
  if(error){alert('Error: '+error.message);return;}
  const s=adminData.spots.find(x=>x.id===id);if(s)s.reports=[];
  const ls=byId(id);if(ls)ls.reports=[];
  renderAdmin('reports');
}

/* ============ INIT ============ */
DISTRICTS.forEach(d=>fDistrict.add(new Option(d,d)));
VIBES.forEach(v=>fVibe.add(new Option(v,v)));

async function init(){
  const{data:{session}}=await db.auth.getSession();
  if(session){
    const{data:profile}=await db.from('profiles').select('*').eq('id',session.user.id).single();
    if(profile){cur={...profile,email:session.user.email};profilesCache[profile.id]=cur;}
  }
  db.auth.onAuthStateChange(async(event,session)=>{
    if(session){
      if(event==='SIGNED_IN')await new Promise(r=>setTimeout(r,400));
      const{data:profile}=await db.from('profiles').select('*').eq('id',session.user.id).single();
      if(profile){cur={...profile,email:session.user.email};profilesCache[profile.id]=cur;}
    }else{cur=null;}
    setUserLabel();renderList();
  });
  setUserLabel();
  // Load spots and reviews as separate queries to avoid PostgREST embedding 401s
  const{data:spotsData,error}=await db.from('spots').select('*');
  if(error){console.error('Load error:',error);document.getElementById('sidebarBody').innerHTML='<div class="empty-note">⚠ '+error.message+' ('+error.code+')</div>';return;}
  const[{data:reviewsData},{data:photosData}]=await Promise.all([
    db.from('reviews').select('*'),
    db.from('photos').select('*').eq('flagged',false)
  ]);
  const reviewsBySpot={};
  (reviewsData||[]).forEach(r=>{
    if(!reviewsBySpot[r.spot_id])reviewsBySpot[r.spot_id]=[];
    reviewsBySpot[r.spot_id].push(dbToReview(r));
  });
  const photosBySpot={};
  (photosData||[]).forEach(p=>{
    if(!photosBySpot[p.spot_id])photosBySpot[p.spot_id]=[];
    photosBySpot[p.spot_id].push(p);
  });
  spots=(spotsData||[]).map(s=>({...dbToSpot(s),reviews:reviewsBySpot[s.id]||[],photos:photosBySpot[s.id]||[]}));
  const pids=[...new Set(spots.map(s=>s.createdBy).filter(id=>id&&id!=='anon'&&id!=='seed'))];
  if(pids.length){const{data:profiles}=await db.from('profiles').select('*').in('id',pids);(profiles||[]).forEach(p=>{profilesCache[p.id]=p;});}
  renderList();
  // Deep-link: ?spot=ID opens that spot on load
  const params=new URLSearchParams(window.location.search);
  const deepSpot=params.get('spot');
  if(deepSpot){
    // Wait a tick for markers to render, then open
    setTimeout(()=>{
      const s=byId(deepSpot);
      if(s){
        map.setView([s.lat,s.lng],17);
        showDetail(s.id);
      }
    },600);
  }
}

function badgesFor(uid){
  const mySpots=spots.filter(s=>s.createdBy===uid);
  const myReviews=spots.flatMap(s=>s.reviews).filter(r=>r.userId===uid);
  const myVerified=spots.filter(s=>s.createdBy===uid&&s.verified);
  const helpfulVotes=myReviews.reduce((a,r)=>(a+(r.helpful||[]).length),0);
  const earned=[];
  if(mySpots.length>=1)  earned.push('first_spot');
  if(mySpots.length>=5)  earned.push('scout');
  if(mySpots.length>=10) earned.push('cartographer');
  if(myReviews.length>=1)  earned.push('first_review');
  if(myReviews.length>=10) earned.push('regular');
  if(myReviews.length>=25) earned.push('critic');
  if(myVerified.length>=1) earned.push('verified_spot');
  if(myVerified.length>=3) earned.push('trusted');
  if(helpfulVotes>=10)   earned.push('helpful');
  return earned;
}

async function checkBadges(){
  if(!cur)return;
  const earned=badgesFor(cur.id);
  const existing=cur.badges||[];
  const newOnes=earned.filter(b=>!existing.includes(b));
  if(!newOnes.length)return;
  const updated=[...new Set([...existing,...earned])];
  await db.from('profiles').update({badges:updated}).eq('id',cur.id);
  cur.badges=updated;
  if(profilesCache[cur.id])profilesCache[cur.id].badges=updated;
  for(const bid of newOnes){
    const b=BADGES.find(x=>x.id===bid);
    if(b)await showBadgeToast(b);
  }
}

async function awardPhotoBadge(){
  if(!cur)return;
  const existing=cur.badges||[];
  if(existing.includes('photographer'))return;
  const updated=[...existing,'photographer'];
  await db.from('profiles').update({badges:updated}).eq('id',cur.id);
  cur.badges=updated;
  if(profilesCache[cur.id])profilesCache[cur.id].badges=updated;
  const b=BADGES.find(x=>x.id==='photographer');
  if(b)showBadgeToast(b);
}

function showToast(msg,duration=2500){
  const el=document.getElementById('badgeToast');
  el.innerHTML=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),duration);
}
function showBadgeToast(b){
  return new Promise(res=>{
    const el=document.getElementById('badgeToast');
    el.innerHTML=`<span style="font-size:22px">${b.icon}</span> <span>New badge: <b>${b.name}</b></span>`;
    el.classList.add('show');
    setTimeout(()=>{el.classList.remove('show');setTimeout(res,400);},3000);
  });
}

function inlineBadges(uid){
  const u=profilesCache[uid];
  if(!u||!u.badges||!u.badges.length)return '';
  return `<span class="inline-badges">${u.badges.slice(0,3).map(bid=>{const b=BADGES.find(x=>x.id===bid);return b?b.icon:''}).join('')}</span>`;
}

init();
